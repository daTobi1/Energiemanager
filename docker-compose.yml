services:
  db:
    image: timescale/timescaledb:latest-pg16
    platform: linux/arm64
    environment:
      POSTGRES_USER: energiemanager
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: energiemanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      platforms:
        - linux/arm64
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ml_models:/app/ml_models
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  grafanadata:
  ml_models:
