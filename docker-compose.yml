services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: energiemanager
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: energiemanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ml_models:/app/ml_models

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - db

volumes:
  pgdata:
  redisdata:
  grafanadata:
  ml_models:
